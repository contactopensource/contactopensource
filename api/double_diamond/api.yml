double_diamond:
  title: Double Diamond
  model: DoubleDiamond
  summary: |-

    Double Diamond is an innovation process model.

  description: |-

    Double Diamond is an innovation process model.

    There are four phases: 
      
    1. Discover
    2. Define
    3. Develop
    4. Deliver

  module: plan
  links:
    main: https://www.designcouncil.org.uk/our-resources/the-double-diamond/
    wikipedia: https://wikipedia.org/wiki/Double_Diamond_(design_process_model)
  attribute_groups:
    - !include ../_meta.yml
    - Main:
        - phase_1_title:
            help: Phase 1 title
            type: text
            example: Discover
        - phase_1_smart:
            help: Explain specific, measurable, actionable, relatable, timely.
            type: smart
            example: The discover phase is …
        - phase_1_resolve_wall_time:
            help: Phase 1 resolve wall time. A.k.a. mean time to resolve (MTTR), which is >= mean time to recover wall time.
            type: duration
            example: 4 hours
        - phase_1_resolve_work_time:
            help: Phase 1 resolve wall time. A.k.a. mean time to resolve (MTTR), which is >= mean time to recover wall time.
            type: duration
            example: 4 hours
        - phase_1_reliability_unit_interval:
            help: Phase 1 reliability unit interval
            type: numeric(6,6)
            example: 0.999999
