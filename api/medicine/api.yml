medicine:
  title: Medicine
  model: Medicine
  summary: |-

    Medicine is a substance or combination of substances used to diagnose, treat, prevent, or alleviate symptoms of diseases and improve health.

  description: |-

    Medicine is a substance or combination of substances used to diagnose, treat, prevent, or alleviate symptoms of diseases and improve health. They work by modifying physiological functions through pharmacological, immunological, or metabolic actions. Medicines include prescription drugs, over-the-counter remedies, and vaccines. 

  attribute_groups:
    - !include ../_meta.yml
    - Main:
      - international_nonproprietary_name:
          help: The International Nonproprietary Name (INN) is a standard generic name assigned to the active ingredient, distinct from its brand name. These names follow specific naming conventions (stems) that reflect their chemical structure, function, or target. For example, -cillin denotes penicillins, -olol indicates beta-blockers, and -statin indicates cholesterol-lowering drugs.
          type: string
          example: aspirin
      - description:
          help: The description provides a detailed overview of the medicine, including its uses, effects, and any relevant information about its application. For example, "Aspirin is a medication used to reduce pain, fever, or inflammation. It is also used as an antiplatelet agent to prevent blood clots."
          type: string
          example: Aspirin is a medication used to reduce pain, fever, or inflammation. It is also used as an antiplatelet agent to prevent blood clots.
  trigram: |-
    CREATE INDEX medicine_index_gto
      ON medicine
      USING GIN ((
        international_nonproprietary_name
          || ' ' ||
        description
      ) gin_trgm_ops);
